<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운동 일기</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', 'Noto Sans KR', -apple-system, sans-serif;
      background: #ede8e3;
      color: #2c1f14;
      min-height: 100vh;
    }

    header {
      background: #faf6f2;
      border-bottom: 1px solid #ecddd3;
      padding: 18px 0 0;
      text-align: center;
    }

    header h1 { font-size: 22px; font-weight: 700; color: #2c1f14; letter-spacing: -0.5px; }
    header p { font-size: 13px; color: #b08060; margin-top: 3px; }
    .daily-quote { font-size: 12px; color: #c4a48a; margin: 6px 16px 0; line-height: 1.5; }
    .daily-quote em { font-style: normal; color: #b08060; }

    /* ───── 뷰 탭 ───── */
    .view-tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 14px;
    }

    .view-tab {
      padding: 10px 32px;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      font-size: 14px;
      font-weight: 700;
      color: #c4a48a;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-tab.active {
      color: #2c1f14;
      border-bottom-color: #c8956c;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ───── 2단 레이아웃 ───── */
    #view-diary {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .diary-left {
      flex: 1;
      min-width: 0;
    }

    .diary-right {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 780px) {
      #view-diary { flex-direction: column; }
    }

    /* ───── 통계 카드 ───── */
    .stats-card {
      background: #7c5c3e;
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
    }

    .stat-item { flex: 1; text-align: center; }
    .stat-item + .stat-item { border-left: 1px solid rgba(255,255,255,0.15); }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.65); margin-bottom: 4px; letter-spacing: 0.3px; }
    .stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-unit { font-size: 12px; color: rgba(255,255,255,0.7); margin-left: 2px; font-weight: 400; }

    /* ───── 달력 ───── */
    .calendar-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #ecddd3;
      margin-bottom: 20px;
      overflow: hidden;
      width: 100%;
      box-sizing: border-box;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .cal-nav h2 { font-size: 15px; font-weight: 700; color: #2c1f14; }

    .nav-btn {
      background: #f5ede3;
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 16px;
      color: #7c5c3e;
    }

    .nav-btn:hover { background: #ecddd3; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      width: 100%;
      box-sizing: border-box;
    }

    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #c4a48a;
      padding: 4px 0 8px;
    }

    .cal-dow:first-child { color: #e07050; }
    .cal-dow:last-child { color: #7090d0; }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: clamp(10px, 1.8vw, 13px);
      position: relative;
      gap: 3px;
      transition: background 0.15s;
      color: #5a3e2b;
      overflow: hidden;
      min-width: 0;
    }

    .cal-day:hover { background: #f0e6dc; }
    .cal-day.empty { cursor: default; }
    .cal-day.empty:hover { background: none; }

    .cal-day.today .day-num {
      background: #7c5c3e;
      color: #fff;
      width: 26px; height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .cal-day.sunday .day-num-wrap { color: #e07050; }
    .cal-day.saturday .day-num-wrap { color: #7090d0; }

    .day-num-wrap { font-size: 13px; font-weight: 400; line-height: 1; }

    .dots { display: flex; gap: 3px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot.running { background: #c8956c; }
    .dot.crossfit { background: #9b6b3e; }

    .legend {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
      margin-top: 14px;
      font-size: 12px;
      color: #a07858;
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-item .dot { width: 8px; height: 8px; border-radius: 3px; }

    /* ───── 섹션 헤더 ───── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-header h2 { font-size: 15px; font-weight: 700; color: #2c1f14; }

    .header-btns { display: flex; gap: 8px; }

    .add-btn {
      background: #7c5c3e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .add-btn:hover { background: #6a4e34; }

    .outline-btn {
      background: #fff;
      color: #7c5c3e;
      border: 1.5px solid #c8956c;
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .outline-btn:hover { background: #fdf5ef; }

    /* ───── 로그 목록 ───── */
    .log-list { display: flex; flex-direction: column; gap: 12px; }

    .log-item {
      background: #fff;
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid #ecddd3;
      border-left: 3px solid #c8956c;
      position: relative;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .log-item:hover { box-shadow: 0 2px 12px rgba(124,92,62,0.1); }

    .log-item.crossfit { border-left-color: #9b6b3e; }

    .log-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .badge.running { background: #f5ede3; color: #7c5c3e; }
    .badge.crossfit { background: #f0e6d8; color: #7a4e28; }

    .log-date { font-size: 12px; color: #b08060; }

    .log-stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat { font-size: 13px; color: #a07858; }
    .stat span { font-weight: 700; color: #2c1f14; }

    .log-diary {
      font-size: 13px;
      color: #7a5c44;
      line-height: 1.7;
      border-top: 1px solid #f0e6dc;
      padding-top: 9px;
    }

    .delete-btn {
      position: absolute;
      top: 14px; right: 14px;
      background: none;
      border: none;
      color: #d4b8a8;
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .delete-btn:hover { color: #9b6b3e; background: #f0e6d8; }

    .empty {
      text-align: center;
      color: #c4a48a;
      font-size: 14px;
      padding: 36px 0;
      line-height: 1.8;
    }

    /* ───── 모달 공통 ───── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,31,20,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #faf6f2;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h2 { font-size: 17px; font-weight: 700; color: #2c1f14; }

    .close-btn {
      background: #f0e6dc;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 14px;
      cursor: pointer;
      color: #7c5c3e;
      font-weight: 700;
    }

    .close-btn:hover { background: #ecddd3; }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #ecddd3;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #c4a48a;
      transition: all 0.15s;
    }

    .tab-btn.active-running { border-color: #c8956c; color: #7c5c3e; background: #fdf5ef; }
    .tab-btn.active-crossfit { border-color: #9b6b3e; color: #7a4e28; background: #f0e6d8; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #7c5c3e;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #ecddd3;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #2c1f14;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus, select:focus { border-color: #c8956c; background: #fff; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .save-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    .save-btn.running { background: #c8956c; color: #fff; }
    .save-btn.crossfit { background: #9b6b3e; color: #fff; }
    .save-btn.dark { background: #7c5c3e; color: #fff; }
    .save-btn:hover { opacity: 0.88; }

    .hidden { display: none; }

    /* ───── WOD 블록 ───── */
    .wod-block {
      border: 1.5px solid #ecddd3;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      background: #fff;
    }

    .wod-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .wod-block-label { font-size: 12px; font-weight: 700; color: #c8956c; }

    .remove-wod-btn {
      background: none;
      border: none;
      color: #d4b8a8;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .remove-wod-btn:hover { color: #9b6b3e; background: #f0e6d8; }

    .add-wod-btn {
      width: 100%;
      padding: 9px;
      border: 1.5px dashed #c8956c;
      border-radius: 10px;
      background: none;
      color: #c8956c;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .add-wod-btn:hover { background: #fdf5ef; }

    /* ───── 무게 입력 행 ───── */
    .weight-section {
      margin-top: 10px;
      border-top: 1px solid #f0e6dc;
      padding-top: 10px;
    }

    .weight-section-label { font-size: 12px; font-weight: 700; color: #b08060; margin-bottom: 6px; }

    .weight-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }

    .weight-row input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      font-size: 13px;
    }

    .weight-row input[type="number"] {
      width: 72px;
      padding: 7px 10px;
      font-size: 13px;
      text-align: right;
    }

    .remove-weight-btn {
      background: none;
      border: none;
      color: #d4b8a8;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .remove-weight-btn:hover { color: #9b6b3e; background: #f0e6d8; }

    .add-weight-btn {
      padding: 5px 10px;
      border: 1px dashed #c4a48a;
      border-radius: 6px;
      background: none;
      color: #b08060;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .add-weight-btn:hover { background: #fdf5ef; }

    /* ───── 로그 카드 WOD 블록 ───── */
    .log-wod-block {
      background: #f0e6d8;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .log-wod-label { font-size: 11px; font-weight: 700; color: #9b6b3e; margin-bottom: 4px; }

    .log-wod-content { font-size: 14px; color: #2c1f14; white-space: pre-wrap; line-height: 1.6; }

    .log-weights { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .log-weight-chip {
      background: #fff;
      border: 1px solid #e8c4b0;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: #7a5c44;
    }

    .log-weight-chip strong { color: #c8956c; font-weight: 700; }

    .log-weight-chip.parsed {
      border-style: dashed;
      color: #a07858;
    }

    .log-weight-chip.parsed strong { color: #c8956c; opacity: 0.7; }

    /* ───── 무게 추이 모달 ───── */
    .trend-modal { max-width: 560px; }

    .movement-selector {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #ecddd3;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #2c1f14;
      outline: none;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .movement-selector:focus { border-color: #c8956c; }

    .parse-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #a07858;
      cursor: pointer;
    }

    .parse-toggle input { width: auto; cursor: pointer; }

    .chart-wrap {
      background: #fff;
      border: 1px solid #ecddd3;
      border-radius: 12px;
      padding: 16px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chart-wrap svg { width: 100%; display: block; }

    .trend-summary { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }

    .trend-chip {
      flex: 1;
      min-width: 100px;
      background: #fff;
      border: 1px solid #ecddd3;
      border-radius: 12px;
      padding: 12px 14px;
      text-align: center;
    }

    .trend-chip .chip-label { font-size: 11px; color: #b08060; margin-bottom: 4px; }
    .trend-chip .chip-value { font-size: 18px; font-weight: 700; color: #2c1f14; }
    .trend-chip .chip-value.up { color: #16a34a; }
    .trend-chip .chip-value.down { color: #9b6b3e; }

    .no-data-msg {
      text-align: center;
      color: #c4a48a;
      font-size: 14px;
      padding: 32px 0;
    }

    /* ───── PR / 1RM 뷰 ───── */
    .pr-list { display: flex; flex-direction: column; gap: 16px; }

    .pr-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #ecddd3;
      overflow: hidden;
    }

    .pr-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }

    .pr-card-header:hover { background: #fdf9f6; }

    .pr-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pr-card-name { font-size: 16px; font-weight: 700; color: #2c1f14; }

    .pr-best-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: #f0e6d8;
      color: #9b6b3e;
    }

    .pr-card-meta { font-size: 13px; color: #b08060; }

    .pr-card-actions { display: flex; gap: 6px; align-items: center; }

    .pr-icon-btn {
      background: none;
      border: none;
      color: #d4b8a8;
      font-size: 15px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
    }

    .pr-icon-btn:hover { color: #9b6b3e; background: #f0e6d8; }

    .pr-card-body { padding: 0 18px 16px; }

    .pr-record-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

    .pr-record-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fdf9f6;
      border-radius: 8px;
      border: 1px solid #f0e6dc;
    }

    .pr-record-date { font-size: 13px; color: #b08060; min-width: 80px; }

    .pr-record-weight {
      font-size: 16px;
      font-weight: 700;
      color: #2c1f14;
      flex: 1;
    }

    .pr-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: #fdf5c4;
      color: #a08020;
    }

    .pr-diff {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .pr-diff.up { background: #dcfce7; color: #16a34a; }
    .pr-diff.down { background: #f0e6d8; color: #9b6b3e; }

    .pr-record-note { font-size: 12px; color: #b08060; }

    .pr-record-delete {
      background: none;
      border: none;
      color: #d4b8a8;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .pr-record-delete:hover { color: #9b6b3e; background: #f0e6d8; }

    .add-record-btn {
      width: 100%;
      padding: 8px;
      border: 1.5px dashed #c8956c;
      border-radius: 8px;
      background: none;
      color: #c8956c;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .add-record-btn:hover { background: #fdf5ef; }

    /* PR 미니 차트 */
    .pr-mini-chart { margin-bottom: 12px; }

    /* ───── PR 모달 ───── */
    .pr-modal { max-width: 400px; }

    /* ───── 백업/복원 버튼 ───── */
    .backup-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 20px 0;
      max-width: 1200px;
      margin: 0 auto;
    }
    .backup-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid #ecddd3;
      background: #fff;
      color: #7c5c3e;
      cursor: pointer;
      font-weight: 700;
    }
    .backup-btn:hover { background: #fdf5ef; }
    .backup-btn.restore { border-color: #d4b8a8; color: #a07858; }

    .backup-reminder {
      font-size: 12px;
      color: #b84a30;
      align-self: center;
      padding: 0 8px;
      font-weight: 700;
    }
    .backup-reminder.hidden { display: none; }

    /* 스크린리더 전용 텍스트 */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* 포커스 표시 */
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid #7c5c3e;
      outline-offset: 2px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      width: min(420px, calc(100% - 32px));
    }
    .toast {
      background: #2c1f14;
      color: #fff;
      padding: 12px 14px 12px 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      box-shadow: 0 10px 30px -10px rgba(44,31,20,0.4);
      pointer-events: auto;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-action {
      background: none;
      border: none;
      color: #f5c38a;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .toast-action:hover { background: rgba(255,255,255,0.1); }

    /* Sticky save button */
    .save-btn {
      position: sticky;
      bottom: 0;
      z-index: 5;
      box-shadow: 0 -8px 16px -8px rgba(44,31,20,0.12);
    }

    /* Today pill */
    .cal-title-wrap { display: flex; align-items: center; gap: 8px; }
    .today-pill {
      background: #f5ede3;
      border: none;
      color: #7c5c3e;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 14px;
      cursor: pointer;
    }
    .today-pill:hover { background: #ecddd3; }
    .today-pill.hidden { display: none; }

    /* Stats delta */
    .stat-delta {
      font-size: 11px;
      margin-left: 6px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }
    .stat-delta.up { color: #a8dcb2; }
    .stat-delta.down { color: #f0b8a8; }
    .stat-delta.flat { color: rgba(255,255,255,0.55); }

    /* Quote collapse */
    .daily-quote {
      cursor: pointer;
    }
    .daily-quote.collapsed {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 520px;
      margin: 6px auto 0;
      padding: 0 20px;
    }

    /* Touch target expansion */
    .delete-btn,
    .pr-record-delete,
    .pr-icon-btn,
    .wod-remove-btn,
    .remove-wod-btn,
    .remove-weight-btn {
      min-width: 34px;
      min-height: 34px;
      padding: 8px 10px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn {
      position: absolute;
      top: 6px; right: 6px;
    }

    /* 프린트 */
    @media print {
      header .view-tabs, .backup-bar, .header-btns,
      .modal-bg, .add-btn, .delete-btn, .close-btn,
      .nav-btn, .legend { display: none !important; }
      body { background: #fff; color: #000; }
      .container { max-width: 100%; padding: 0; }
      .log-item, .calendar-card, .stats-card, .pr-card {
        break-inside: avoid;
        box-shadow: none;
        border: 1px solid #ddd;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>운동 일기</h1>
  <p>오늘도 수고했어요</p>
  <p class="daily-quote collapsed" id="daily-quote" onclick="this.classList.toggle('collapsed')" title="클릭하여 펼치기"></p>

    <button class="view-tab" id="tab-pr" onclick="showView('pr')">PR / 1RM</button>

<div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

<div class="backup-bar">

<div class="container">

  <!-- ───── 일기 뷰 ───── -->

    <div class="diary-left">
      <div class="stats-card" id="stats-card">

          <div class="stat-label">이번달 운동</div>
          <div class="stat-value" id="stats-total">0<span class="stat-unit">회</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">총 러닝</div>
          <div class="stat-value" id="stats-running">0<span class="stat-unit">km</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">크로스핏</div>

      </div>

      <div class="calendar-card">
        <div class="cal-nav">

          <div class="cal-title-wrap">

        </div>

        <div class="legend">

          <button class="add-btn" onclick="openModal(selectedDate)">+ 기록 추가</button>
        </div>

      <div class="log-list" id="log-list"></div>

  <!-- ───── PR / 1RM 뷰 ───── -->
  <div id="view-pr" class="hidden">

</div>

<!-- 기록 추가/수정 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-header">

<!-- 무게 추이 모달 -->

<script>
  // ══════════════════════════════
  //  공통 유틸 (XSS / 저장 / 검증)
  // ══════════════════════════════
  const BACKUP_SCHEMA_VERSION = 1;
  const BACKUP_REMIND_DAYS = 14;

  function escapeHtml(v) {
    if (v == null) return '';
    return String(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(v) { return escapeHtml(v); }

  // 저장 전 직전 데이터를 sessionStorage에 스냅샷 (실수 복구용)
  function snapshotBeforeWrite(key) {
    try {
      const cur = localStorage.getItem(key);
      if (cur) sessionStorage.setItem(key + '_prev', cur);
    } catch (e) { /* sessionStorage 가득 등 무시 */ }
  }

  function restoreFromSnapshot(key) {
    const prev = sessionStorage.getItem(key + '_prev');
    if (!prev) { showToast('복원할 스냅샷이 없어요'); return false; }
    if (!safeSetItem(key, prev)) return false;
    if (key === 'sportslogs') { renderCalendar(); renderLogs(); }
    else if (key === 'prdata') renderPRView();
    return true;
  }

  // ── Toast ──
  function showToast(message, opts) {
    const { action = null, duration = 3000 } = opts || {};
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast';
    const span = document.createElement('span');
    span.textContent = message;
    toast.appendChild(span);
    let timer;
    const dismiss = () => {
      clearTimeout(timer);
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 220);
    };
    if (action) {
      const btn = document.createElement('button');
      btn.className = 'toast-action';
      btn.textContent = action.label;
      btn.onclick = () => { try { action.onClick(); } finally { dismiss(); } };
      toast.appendChild(btn);
    }
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    timer = setTimeout(dismiss, action ? Math.max(duration, 5000) : duration);
  }

  // localStorage 쓰기 안전 래퍼 (할당량 초과 시 경고)
  function safeSetItem(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      alert('브라우저 저장 공간이 부족합니다. 백업 후 오래된 기록을 정리해주세요.');
      return false;
    }
  }

  // 날짜 무결성 (YYYY-MM-DD)
  function isValidDateStr(s) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(s || '')) return false;
    const d = new Date(s);
    return !isNaN(d) && s >= '2000-01-01';
  }
  function isFutureDate(s) {
    const today = new Date().toISOString().slice(0, 10);
    return s > today;
  }

  // 숫자 입력 검증 (음수 / NaN 차단, 빈값 허용)
  function validatePositiveNumber(val, fieldName, { allowEmpty = true } = {}) {
    if (val === '' || val == null) return allowEmpty ? null : `${fieldName}을(를) 입력해주세요.`;
    const n = parseFloat(val);
    if (isNaN(n)) return `${fieldName}은(는) 숫자여야 합니다.`;
    if (n < 0) return `${fieldName}은(는) 음수일 수 없습니다.`;
    return null;
  }

  // ── 매일 명언 ──
  const QUOTES = [
    { text: "고통은 일시적이다. 포기는 영원하다.", author: "랜스 암스트롱 (Tour de France 7회 우승)" },
    { text: "챔피언은 체육관에서 만들어지지 않는다. 내면 깊은 곳의 열망, 꿈, 비전으로 만들어진다.", author: "무하마드 알리 (올림픽 금메달·세계 헤비급 챔피언)" },
    { text: "불가능이란 아무것도 하지 않는 사람들의 변명이다.", author: "무하마드 알리 (올림픽 금메달·세계 헤비급 챔피언)" },
    { text: "한계란 오직 마음속에만 존재한다.", author: "마이클 펠프스 (올림픽 수영 금메달 23개)" },
    { text: "나는 매번 지금까지 한 것 중 가장 힘든 훈련을 한다.", author: "마이클 펠프스 (올림픽 수영 금메달 23개)" },
    { text: "노력하는 것을 두려워하지 마라. 위대한 것은 쉽게 얻어지지 않는다.", author: "우사인 볼트 (올림픽 단거리 금메달 8개)" },
    { text: "나는 훈련할 때 내일의 나와 경쟁한다.", author: "우사인 볼트 (올림픽 단거리 금메달 8개)" },
    { text: "오늘 당신이 포기하고 싶은 순간, 그때가 바로 당신이 성장하는 순간이다.", author: "세리나 윌리엄스 (그랜드슬램 23회 우승)" },
    { text: "이기는 것에 집착하지 말고, 최선을 다하는 것에 집착하라.", author: "세리나 윌리엄스 (그랜드슬램 23회 우승)" },
    { text: "매일 조금씩 나아지는 것이 결국 큰 차이를 만든다.", author: "마이클 조던 (NBA 파이널 MVP 6회)" },
    { text: "나는 9,000번 이상 슛을 실패했다. 그것이 내가 성공한 이유다.", author: "마이클 조던 (NBA 파이널 MVP 6회)" },
    { text: "한 번도 쓰러지지 않은 것이 명예가 아니다. 쓰러질 때마다 다시 일어서는 것이 명예다.", author: "넬슨 만델라" },
    { text: "위대한 일을 하는 유일한 방법은 자신이 하는 일을 사랑하는 것이다.", author: "스티브 잡스 (애플 창업자)" },
    { text: "지금 이 순간 할 수 있는 최선을 다하라.", author: "오프라 윈프리 (방송인·작가)" },
    { text: "두려움은 꿈을 이루지 못하게 막는 가장 큰 장벽이다.", author: "오프라 윈프리 (방송인·작가)" },
    { text: "우리가 반복적으로 하는 행동이 우리 자신이다. 탁월함은 행동이 아니라 습관이다.", author: "아리스토텔레스 (철학자)" },
    { text: "천 리 길도 한 걸음부터.", author: "노자 (《도덕경》 저자)" },
    { text: "인생에서 가장 중요한 것은 자신이 원하는 것을 알고, 그것을 향해 나아가는 것이다.", author: "톨스토이 (《전쟁과 평화》 저자)" },
    { text: "성공은 열정을 잃지 않고 실패를 거듭하는 능력이다.", author: "윈스턴 처칠 (전 영국 총리)" },
    { text: "당신이 할 수 있다고 생각하든, 할 수 없다고 생각하든 당신이 옳다.", author: "헨리 포드 (포드 자동차 창업자)" },
    { text: "시작이 반이다.", author: "아리스토텔레스 (철학자)" },
    { text: "꿈을 이루고자 하는 용기만 있다면 모든 꿈을 이룰 수 있다.", author: "월트 디즈니 (월트 디즈니 창업자)" },
    { text: "성공의 비밀은 다른 사람들이 쉬는 동안에도 준비하는 것이다.", author: "헨리 포드 (포드 자동차 창업자)" },
    { text: "몸이 할 수 없다고 말할 때, 마음이 계속하라고 말한다.", author: "킵 케이노 (올림픽 육상 금메달리스트)" },
    { text: "기록은 깨지기 위해 존재한다.", author: "제시 오언스 (베를린 올림픽 금메달 4개)" },
    { text: "자신을 믿어라. 당신의 능력과 판단력을 믿어라.", author: "엘라 피츠제럴드 (재즈 보컬리스트)" },
    { text: "강인함이란 포기하고 싶을 때 한 발짝 더 내딛는 것이다.", author: "데이비드 고긴스 (전 네이비씰·울트라마라톤 선수)" },
    { text: "불편함이 없으면 성장도 없다.", author: "데이비드 고긴스 (전 네이비씰·울트라마라톤 선수)" },
    { text: "가장 느린 사람도 목표를 잃지 않는다면 아무것도 하지 않는 사람보다 빠르다.", author: "소크라테스 (철학자)" },
    { text: "당신이 포기하지 않는 한 실패한 것이 아니다.", author: "딕 호이트 (철인3종 선수·부자)" },
    { text: "훈련은 배신하지 않는다.", author: "하일레 게브르셀라시에 (올림픽 마라톤·장거리 금메달리스트)" },
    { text: "내가 얼마나 멀리 왔는지를 돌아볼 때 비로소 다음 걸음을 내딛을 힘이 생긴다.", author: "넬슨 만델라" },
    { text: "고통을 즐겨라. 고통이 없으면 발전도 없다.", author: "아놀드 슈워제네거 (올림픽 보디빌딩 챔피언·배우)" },
    { text: "나는 자고 싶을 때마다 이렇게 말한다. 쉬어도 된다. 죽으면 영원히 쉴 수 있으니까.", author: "아놀드 슈워제네거 (올림픽 보디빌딩 챔피언·배우)" },
    { text: "중요한 것은 얼마나 세게 맞았는가가 아니라, 얼마나 세게 맞고도 계속 앞으로 나아갈 수 있는가이다.", author: "실베스터 스탤론 (《록키》 원작·주연)" },
    { text: "진정한 챔피언은 도전을 피하지 않는다. 도전 속에서 자신을 발견한다.", author: "빌리 진 킹 (윔블던 6회 우승·인권 운동가)" },
    { text: "나는 매일 아침 일어나 더 나은 사람이 되기로 결심한다.", author: "로저 페더러 (그랜드슬램 20회 우승)" },
    { text: "완벽함은 연습에서 온다.", author: "로저 페더러 (그랜드슬램 20회 우승)" },
    { text: "땀 흘리는 만큼 성장한다.", author: "리오넬 메시 (FIFA 발롱도르 8회)" },
    { text: "나보다 재능 있는 사람은 많다. 하지만 나보다 열심히 하는 사람은 없다.", author: "크리스티아누 호날두 (FIFA 발롱도르 5회)" },
    { text: "성공은 우연이 아니다. 노력, 인내, 배움, 희생 그리고 무엇보다 사랑이다.", author: "펠레 (FIFA 월드컵 3회 우승)" },
    { text: "당신의 몸은 당신이 무엇을 먹고 어떻게 움직이는지를 기억한다.", author: "에드 시런 (싱어송라이터·작가)" },
    { text: "작은 진전이라도 진전이다.", author: "아이작 뉴턴 (물리학자·《자연철학의 수학적 원리》 저자)" },
    { text: "체력은 덕목 중 하나다.", author: "마르쿠스 아우렐리우스 (《명상록》 저자)" },
    { text: "건강한 신체에 건강한 정신이 깃든다.", author: "유베날리스 (로마 시인)" },
    { text: "할 수 있다고 믿는 사람과 할 수 없다고 믿는 사람, 둘 다 옳다.", author: "헨리 포드 (포드 자동차 창업자)" },
    { text: "지금 당장 시작하라. 완벽할 때를 기다리지 마라.", author: "나폴레온 힐 (《생각하라 그러면 부자가 되리라》 저자)" },
    { text: "당신의 한계는 당신이 정한 것이다.", author: "마이클 조던 (NBA 파이널 MVP 6회)" },
    { text: "매일의 작은 노력이 결국 기적을 만든다.", author: "파울로 코엘료 (《연금술사》 저자)" },
    { text: "삶에서 가장 중요한 것은 계속 나아가는 것이다.", author: "파울로 코엘료 (《연금술사》 저자)" },
    { text: "강함은 몸에서 오지 않는다. 정복할 수 없다고 생각했던 것을 이겨냈을 때 온다.", author: "마하트마 간디" },
    { text: "당신이 변화를 원한다면, 당신 자신이 그 변화가 되어야 한다.", author: "마하트마 간디" },
    { text: "오늘 고통스러운 훈련이 내일의 쉬운 경기를 만든다.", author: "에릭 도마지 (올림픽 스키 금메달리스트)" },
    { text: "이기고 싶다면 먼저 지는 법을 배워라.", author: "빌리 진 킹 (윔블던 6회 우승)" },
    { text: "몸은 거짓말을 하지 않는다.", author: "마사 그레이엄 (현대 무용의 어머니)" },
    { text: "나는 항상 더 잘할 수 있다고 믿는다.", author: "케이티 레데키 (올림픽 수영 금메달 7개)" },
    { text: "최고가 되고 싶다면 최고처럼 훈련하라.", author: "케이티 레데키 (올림픽 수영 금메달 7개)" },
    { text: "인생은 마라톤이지 단거리 경주가 아니다.", author: "워런 버핏 (투자자·사업가)" },
    { text: "성장의 고통 없이는 힘의 이득도 없다.", author: "벤자민 프랭클린 (미국 건국의 아버지·작가)" },
    { text: "강한 몸은 강한 의지를 만든다.", author: "테오도어 루즈벨트 (전 미국 대통령)" },
    { text: "행동이 항상 행복을 가져다주지는 않지만, 행동 없이는 행복이 없다.", author: "존 버로스 (자연주의 작가)" },
    { text: "당신의 최악의 날도 누군가에게는 최고의 날일 수 있다. 감사하고 움직여라.", author: "닉 부이치치 (작가·동기부여 강연가)" },
    { text: "규칙적인 운동은 내가 알고 있는 가장 강력한 항우울제다.", author: "제임스 클리어 (《아주 작은 습관의 힘》 저자)" },
    { text: "운동은 선택이 아니라 의무다. 몸은 움직이도록 설계되어 있다.", author: "잭 라레인 (피트니스의 아버지·운동생리학자)" },
    { text: "체육관에서 흘린 땀은 절대 거짓말하지 않는다.", author: "마크 리퍼토 (파워리프팅 세계챔피언)" },
    { text: "오늘 훈련을 빠지면 내일 경쟁자는 훈련하고 있다는 걸 기억하라.", author: "에릭 토마스 (동기부여 강연가·트레이너)" },
    { text: "근육은 편안함 속에서 만들어지지 않는다.", author: "브룩 버크 (피트니스 코치·운동선수)" },
    { text: "운동 후 후회한 적은 단 한 번도 없다.", author: "작자 미상 (크로스핏 커뮤니티 격언)" },
    { text: "1세트만 더. 항상 1세트만 더.", author: "아놀드 슈워제네거 (올림픽 보디빌딩 챔피언)" },
    { text: "무거운 걸 들어야 강해진다. 쉬운 길은 없다.", author: "마크 리퍼토 (파워리프팅 세계챔피언)" },
    { text: "달리기는 생각을 정리해주는 최고의 치료제다.", author: "마이크 타이슨 (전 세계 헤비급 복싱 챔피언)" },
    { text: "내 몸이 비명을 질러도 내 정신이 멈추지 않는다.", author: "데이비드 고긴스 (전 네이비씰·울트라마라톤 선수)" },
    { text: "훈련은 전투보다 힘들어야 한다. 그래야 전투가 쉬워진다.", author: "이순신 장군 정신에서 유래된 훈련 격언" },
    { text: "두 번째 바람은 항상 온다. 포기하지 않는 사람에게만.", author: "빌 로저스 (보스턴 마라톤 4회 우승)" },
    { text: "마라톤은 반이 신체 능력, 반이 정신력이다.", author: "프랭크 쇼터 (올림픽 마라톤 금메달리스트)" },
    { text: "벽에 부딪힐 때가 바로 돌파구가 열리기 직전이다.", author: "팻 리피 (크로스컨트리 코치)" },
    { text: "유산소는 체지방을 태우고, 근력 운동은 삶의 질을 높인다. 둘 다 해라.", author: "스튜어트 맥로버트 (《근육 만들기의 성경》 저자)" },
    { text: "자신을 이기는 것이 어떤 상대도 이기는 것보다 어렵다.", author: "플라톤 (철학자·레슬링 선수)" },
    { text: "몸을 단련하는 것은 의지를 단련하는 것과 같다.", author: "하비 펜닉 (골프 코치·《리틀 레드 북》 저자)" },
    { text: "더 많이 땀 흘릴수록 더 적게 피를 흘린다.", author: "조지 S. 패튼 (미 육군 장군)" },
    { text: "운동은 당신이 할 수 있는 일을 한다. 휴식은 당신이 더 잘 할 수 있게 한다.", author: "짐 립스 (스포츠 과학자·트레이너)" },
    { text: "1%씩 매일 나아지면 1년 후 37배 성장한다.", author: "제임스 클리어 (《아주 작은 습관의 힘》 저자)" },
    { text: "체육관에 가지 않을 이유는 항상 있다. 가야 할 이유도 항상 있다. 선택은 당신의 것이다.", author: "에릭 토마스 (동기부여 강연가·트레이너)" },
    { text: "통증은 일시적이지만 자랑스러움은 영원하다.", author: "에릭 토마스 (동기부여 강연가·트레이너)" },
    { text: "오늘의 나는 어제의 나보다 강하다.", author: "미야모토 무사시 (검객·《오륜서》 저자)" },
    { text: "쉬운 날은 없다. 쉬운 날은 은퇴하고 나서 온다.", author: "조 프레이저 (올림픽 헤비급 금메달리스트)" },
    { text: "기록은 훈련장 밖이 아닌 훈련장 안에서 깨진다.", author: "제시 오언스 (베를린 올림픽 금메달 4개)" },
    { text: "두려움은 근육처럼 훈련으로 극복할 수 있다.", author: "닐 암스트롱 (우주비행사·군인)" },
    { text: "스쿼트를 하면 인생이 보인다.", author: "마크 리퍼토 (파워리프팅 세계챔피언)" },
    { text: "숨이 차오를 때 비로소 진짜 운동이 시작된다.", author: "그레그 글래스먼 (크로스핏 창시자)" },
    { text: "강도가 없으면 적응도 없다.", author: "그레그 글래스먼 (크로스핏 창시자)" },
    { text: "좋은 몸은 체육관에서 만들어지지만, 위대한 몸은 주방에서 완성된다.", author: "잭 라레인 (피트니스의 아버지)" },
    { text: "오늘 포기하면 내일 다시 시작해야 한다.", author: "작자 미상 (러닝 커뮤니티 격언)" },
    { text: "100번의 생각보다 1번의 행동이 낫다.", author: "월터 페이튼 (NFL 명예의 전당)" },
    { text: "지구력은 근력보다 더 어렵게 얻어지고 더 느리게 사라진다.", author: "짐 픽스 (《달리기의 완전한 책》 저자)" },
    { text: "내 최고의 경쟁자는 어제의 나다.", author: "케빈 듀란트 (NBA 2회 우승·MVP)" },
    { text: "운동하지 않을 시간은 없다. 아프거나 죽을 시간은 있는가?", author: "잭 라레인 (피트니스의 아버지)" },
    { text: "근육통은 약함이 몸을 떠나는 소리다.", author: "작자 미상 (웨이트트레이닝 격언)" },
    { text: "체력이 모든 것의 기반이다. 몸이 강해야 마음도 강해진다.", author: "테오도어 루즈벨트 (전 미국 대통령)" },
    { text: "어떤 운동이든 하지 않는 것보다 낫다.", author: "히포크라테스 (의학의 아버지)" },
    { text: "걷기는 인간이 발명한 최고의 약이다.", author: "히포크라테스 (의학의 아버지)" },
    { text: "올림픽에서 지는 것은 올림픽에 나가지 않는 것보다 낫다.", author: "피에르 드 쿠베르탱 (근대 올림픽 창설자)" },
    { text: "중요한 것은 이기는 것이 아니라 참가하는 것이다.", author: "피에르 드 쿠베르탱 (근대 올림픽 창설자)" },
    { text: "하루를 운동으로 시작하면 나머지 하루가 달라진다.", author: "리처드 브랜슨 (버진 그룹 창업자)" },
    { text: "운동은 내 하루의 닻이다. 그것이 모든 것을 붙들어준다.", author: "버락 오바마 (전 미국 대통령)" },
    { text: "매일 아침 훈련은 협상 불가다.", author: "코비 브라이언트 (NBA 5회 우승·MVP)" },
    { text: "새벽 4시 체육관에 아무도 없을 때, 나는 챔피언이 되는 이유를 알았다.", author: "코비 브라이언트 (NBA 5회 우승·MVP)" },
    { text: "내가 잠든 사이에도 경쟁자는 훈련하고 있다.", author: "코비 브라이언트 (NBA 5회 우승·MVP)" },
    { text: "한 번 더 할 수 있다고 생각할 때 두 번 더 하라.", author: "짐 로저스 (역도 세계챔피언)" },
    { text: "철봉 앞에서는 거짓말을 할 수 없다.", author: "작자 미상 (파워리프팅 격언)" },
    { text: "플랜크 자세를 1분 버티는 것은 인생을 1분 더 버티는 것과 같다.", author: "작자 미상 (코어 트레이닝 격언)" },
    { text: "운동은 나이를 늦추는 유일하게 증명된 방법이다.", author: "케네스 쿠퍼 (에어로빅스 창시자·운동생리학자)" },
    { text: "부상은 잘못된 자세에서 온다. 겸손하게 기초부터 다져라.", author: "그레이 쿡 (FMS 창시자·물리치료사)" },
    { text: "속도는 나중에 온다. 먼저 끝까지 완주하는 사람이 돼라.", author: "할 히그든 (마라톤 훈련법 저자)" },
    { text: "완벽한 훈련 계획보다 지금 당장 시작하는 것이 낫다.", author: "마크 로슨 (트라이애슬론 코치)" },
    { text: "오늘의 고통이 내일의 체력이 된다.", author: "이반 드라고 명언에서 영감받은 트레이닝 격언" },
    { text: "숨이 차도 멈추지 않는다. 천천히 걸어도 계속 앞으로 간다.", author: "작자 미상 (마라톤 격언)" },
    { text: "운동의 효과는 나이에 상관없이 동등하게 적용된다.", author: "월터 보링 (스포츠 의학 전문가)" },
    { text: "매 반복이 나를 더 나은 사람으로 만든다.", author: "작자 미상 (웨이트트레이닝 격언)" },
    { text: "동기는 시작하게 하고, 습관은 계속하게 한다.", author: "짐 라이언 (올림픽 중거리 선수·상원의원)" },
    { text: "근육은 체육관에서 만들어지지 않는다. 식사와 수면에서 완성된다.", author: "아놀드 슈워제네거 (올림픽 보디빌딩 챔피언)" },

  const today = new Date();

  function normalizeMovement(name) {
    return (name || '').trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function toKg(weight, unit) {
    return (unit === 'lbs' || unit === 'lb') ? weight * 0.453592 : weight;
  }

  function fmtWeight(weight, unit) {
    return unit === 'lbs' ? `${weight}lbs` : `${weight}kg`;

  function showView(view) {
    document.getElementById('view-diary').classList.toggle('hidden', view !== 'diary');
    document.getElementById('view-pr').classList.toggle('hidden', view !== 'pr');
    document.getElementById('tab-diary').classList.toggle('active', view === 'diary');

  // ══════════════════════════════
  //  달력
  // ══════════════════════════════
  function renderCalendar() {
    const title = document.getElementById('cal-title');
    const grid = document.getElementById('cal-grid');
    title.textContent = `${viewYear}년 ${viewMonth + 1}월`;

    const logs = getLogs();
    const dayMap = {};
    logs.forEach(l => {
      if (!dayMap[l.date]) dayMap[l.date] = new Set();
      dayMap[l.date].add(l.type);
    });

    const dows = ['일','월','화','수','목','금','토'];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === todayStr;
      const dow = new Date(viewYear, viewMonth, d).getDay();
      const types = dayMap[dateStr];
      const isSelected = dateStr === selectedDate;

      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (dow === 0) cls += ' sunday';
      if (dow === 6) cls += ' saturday';

      const numStyle = isSelected && !isToday
        ? 'style="background:#f0f0eb;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;"'
        : '';

      const dotsHtml = types
        ? `<div class="dots">${[...types].map(t => `<div class="dot ${t}"></div>`).join('')}</div>`
        : '';

      html += `<div class="${cls}" onclick="selectDate('${dateStr}')">
        <div class="day-num-wrap"><div class="day-num" ${numStyle}>${d}</div></div>
        ${dotsHtml}
      </div>`;
    }

    grid.innerHTML = html;

    // 오늘 pill 노출 여부
    const now = new Date();
    const atToday = (viewYear === now.getFullYear() && viewMonth === now.getMonth());
    const pill = document.getElementById('today-pill');
    if (pill) pill.classList.toggle('hidden', atToday);

    renderStats();
  }

  function goToday() {
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    selectedDate = null;
    renderCalendar();
    renderLogs();
  }

  function renderStats() {
    const logs = getLogs();
    const inMonth = (y, m) => logs.filter(l => {
      const [ly, lm] = l.date.split('-').map(Number);
      return ly === y && lm === m + 1;
    });
    const monthLogs = inMonth(viewYear, viewMonth);
    const runLogs = monthLogs.filter(l => l.type === 'running');
    const cfLogs = monthLogs.filter(l => l.type === 'crossfit');
    const totalKm = runLogs.reduce((sum, l) => sum + (parseFloat(l.distance) || 0), 0);

    // 전월
    let pY = viewYear, pM = viewMonth - 1;
    if (pM < 0) { pM = 11; pY -= 1; }
    const prev = inMonth(pY, pM);
    const prevRun = prev.filter(l => l.type === 'running');
    const prevCf = prev.filter(l => l.type === 'crossfit');
    const prevKm = prevRun.reduce((s, l) => s + (parseFloat(l.distance) || 0), 0);

    const deltaInt = (cur, pv) => {
      if (pv === 0 && cur === 0) return '';
      if (pv === 0) return `<span class="stat-delta up">첫 달</span>`;
      const d = cur - pv;
      const cls = d > 0 ? 'up' : d < 0 ? 'down' : 'flat';
      const sign = d > 0 ? '+' : '';
      return `<span class="stat-delta ${cls}">${sign}${d}</span>`;
    };
    const deltaKm = (cur, pv) => {
      if (pv === 0 && cur === 0) return '';
      if (pv === 0) return `<span class="stat-delta up">첫 달</span>`;
      const d = cur - pv;
      const cls = d > 0 ? 'up' : d < 0 ? 'down' : 'flat';
      const sign = d > 0 ? '+' : '';
      return `<span class="stat-delta ${cls}">${sign}${d.toFixed(1)}km</span>`;
    };

    document.getElementById('stats-total').innerHTML = `${monthLogs.length}<span class="stat-unit">회</span>${deltaInt(monthLogs.length, prev.length)}`;
    document.getElementById('stats-running').innerHTML = `${totalKm.toFixed(1)}<span class="stat-unit">km</span>${deltaKm(totalKm, prevKm)}`;
    document.getElementById('stats-crossfit').innerHTML = `${cfLogs.length}<span class="stat-unit">회</span>${deltaInt(cfLogs.length, prevCf.length)}`;
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    selectedDate = null;
    renderCalendar();
    renderLogs();
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    renderCalendar();
    renderLogs();
  }

  let currentTab = 'running';

  function renderWodBlocks(wods) {
    wodCount = 0;
    document.getElementById('wod-list').innerHTML = '';
    const list = (wods && wods.length) ? wods : [{ content: '', record: '', weights: [] }];
    list.forEach(w => {
      const item = typeof w === 'string' ? { content: w, record: '', weights: [] } : w;
      addWod(item.content, item.record, item.weights || []);
    });
  }

  function addWod(text, record, weights) {
    wodCount++;
    const idx = wodCount;
    const div = document.createElement('div');
    div.className = 'wod-block';
    div.id = `wod-block-${idx}`;
    div.innerHTML = `
      <div class="wod-block-header">
        <span class="wod-block-label">WOD ${idx}</span>
        ${idx > 1 ? `<button type="button" class="remove-wod-btn" onclick="removeWod(${idx})" aria-label="WOD 삭제">✕</button>` : ''}
      </div>
      <textarea id="cf-wod-${idx}" style="min-height:90px;width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none;resize:vertical;margin-bottom:8px;" placeholder="예: Fran 21-15-9&#10;Thruster 43kg&#10;Pull-up 바디웨이트">${escapeHtml(text || '')}</textarea>
      <label style="font-size:12px;font-weight:700;color:#888;display:block;margin-bottom:4px;">기록</label>
      <input type="text" id="cf-record-${idx}" value="${escapeAttr(record || '')}" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none;" placeholder="예: 7분 32초, Rx">
      <div class="weight-section">
        <div class="weight-section-label">무게 기록 <span style="font-weight:400;color:#bbb;">(비우면 텍스트에서 자동 감지)</span></div>
        <div id="weight-list-${idx}"></div>
        <button type="button" class="add-weight-btn" onclick="addWeightRow(${idx})">+ 무게 추가</button>
      </div>
    `;
    document.getElementById('wod-list').appendChild(div);
    if (weights && weights.length) {
      weights.forEach(w => addWeightRow(idx, w.movement, w.weight, w.unit));
    }
  }

  function addWeightRow(wodIdx, movement, weight, unit) {
    const list = document.getElementById(`weight-list-${wodIdx}`);
    if (!list) return;
    const u = unit || 'kg';
    const row = document.createElement('div');
    row.className = 'weight-row';
    row.innerHTML = `
      <input type="text" placeholder="동작명 (예: Thruster)" value="${escapeAttr(movement || '')}" style="flex:1;padding:7px 10px;font-size:13px;background:#fff;border:1px solid #ddd;border-radius:8px;outline:none;">
      <input type="number" placeholder="0" value="${escapeAttr(weight || '')}" min="0" step="0.5" style="width:66px;padding:7px 8px;font-size:13px;background:#fff;border:1px solid #ddd;border-radius:8px;outline:none;text-align:right;">
      <select style="width:58px;padding:6px 4px;font-size:12px;background:#fff;border:1px solid #ddd;border-radius:8px;outline:none;flex-shrink:0;cursor:pointer;">
        <option value="kg" ${u === 'kg' ? 'selected' : ''}>kg</option>
        <option value="lbs" ${u === 'lbs' ? 'selected' : ''}>lbs</option>
      </select>
      <button type="button" class="remove-weight-btn" onclick="this.parentElement.remove()" aria-label="무게 삭제">✕</button>
    `;
    list.appendChild(row);
  }

  function removeWod(idx) {
    const el = document.getElementById(`wod-block-${idx}`);
    if (el) el.remove();
  }

  function getWods() {
    const results = [];
    document.querySelectorAll('#wod-list .wod-block').forEach(block => {
      const ta = block.querySelector('textarea');
      const rec = block.querySelector('input[type="text"]');
      const weightRows = block.querySelectorAll('.weight-row');
      const weights = [];
      weightRows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const unitSel = row.querySelector('select');
        const mov = inputs[0] ? inputs[0].value.trim() : '';
        const wt = inputs[1] ? inputs[1].value.trim() : '';
        const unit = unitSel ? unitSel.value : 'kg';
        if (mov || wt) weights.push({ movement: mov, weight: wt ? parseFloat(wt) : null, unit });
      });
      results.push({ content: ta ? ta.value.trim() : '', record: rec ? rec.value.trim() : '', weights });
    });
    return results.filter(w => w.content || w.record || w.weights.length);
  }

  // ══════════════════════════════
  //  백업 / 복원
  // ══════════════════════════════
  function exportBackup() {
    const data = {
      version: BACKUP_SCHEMA_VERSION,
      sportslogs: JSON.parse(localStorage.getItem('sportslogs') || '[]'),
      prdata: JSON.parse(localStorage.getItem('prdata') || '{"movements":[]}'),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `sports-backup-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem('lastBackupAt', new Date().toISOString());
    updateBackupReminder();
    showToast('백업 파일을 내려받았어요');
  }

  function restoreBackup() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        let data;
        try { data = JSON.parse(ev.target.result); }
        catch { alert('파일 형식이 올바르지 않습니다.'); return; }
        if (!data || (!Array.isArray(data.sportslogs) && !data.prdata)) {
          alert('올바른 백업 파일이 아닙니다.');
          return;
        }
        if (data.version && data.version > BACKUP_SCHEMA_VERSION) {
          if (!confirm('더 새 버전의 백업 파일입니다. 일부 데이터가 누락될 수 있습니다. 계속할까요?')) return;
        }
        // 현재 데이터가 있으면 복원 방식 선택
        const curLogs = JSON.parse(localStorage.getItem('sportslogs') || '[]');
        const curHasData = curLogs.length > 0;
        let mode = 'overwrite';
        if (curHasData) {
          const ans = confirm(`현재 기록 ${curLogs.length}건이 있습니다.\n\n[확인] 병합 (ID 충돌 시 백업 우선)\n[취소] 전체 덮어쓰기`);
          mode = ans ? 'merge' : 'overwrite';
        }
        snapshotBeforeWrite('sportslogs');
        snapshotBeforeWrite('prdata');
        try {
          if (Array.isArray(data.sportslogs)) {
            let next = data.sportslogs;
            if (mode === 'merge') {
              const byId = new Map(curLogs.map(l => [l.id, l]));
              data.sportslogs.forEach(l => byId.set(l.id, l));
              next = [...byId.values()].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            }
            if (!safeSetItem('sportslogs', JSON.stringify(next))) return;
          }
          if (data.prdata) {
            if (!safeSetItem('prdata', JSON.stringify(data.prdata))) return;
          }
        } catch {
          alert('복원 중 오류가 발생했습니다.');
          return;
        }
        renderCalendar();
        renderLogs();
        renderPRView();
        updateBackupReminder();
        showToast(`복원 완료. 기록 ${data.sportslogs?.length || 0}건을 불러왔어요`);
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // 마지막 백업이 14일 이상 경과하면 상단에 경고 표시
  function updateBackupReminder() {
    const el = document.getElementById('backup-reminder');
    if (!el) return;
    const last = localStorage.getItem('lastBackupAt');
    const logs = JSON.parse(localStorage.getItem('sportslogs') || '[]');
    if (logs.length === 0) { el.classList.add('hidden'); return; }
    if (!last) {
      el.textContent = '아직 백업한 적 없어요. 백업 권장';
      el.classList.remove('hidden');
      return;
    }
    const days = Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
    if (days >= BACKUP_REMIND_DAYS) {
      el.textContent = `마지막 백업 ${days}일 전. 백업 권장`;
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  }

  // ══════════════════════════════
  //  저장 / 삭제
  // ══════════════════════════════
  function getLogs() { return JSON.parse(localStorage.getItem('sportslogs') || '[]'); }

  function save(type) {
    let entry = { type, id: editingId || Date.now() };
    if (type === 'running') {
      const date = document.getElementById('run-date').value;
      if (!isValidDateStr(date)) { alert('올바른 날짜를 입력해주세요.'); return; }
      if (isFutureDate(date) && !confirm('미래 날짜입니다. 이대로 저장할까요?')) return;
      const distance = document.getElementById('run-distance').value;
      const time = document.getElementById('run-time').value;
      const distErr = validatePositiveNumber(distance, '거리');
      const timeErr = validatePositiveNumber(time, '시간');
      if (distErr) { alert(distErr); return; }
      if (timeErr) { alert(timeErr); return; }
      entry = { ...entry, date, distance, time,
        place: document.getElementById('run-place').value.trim(),
        diary: document.getElementById('run-diary').value.trim() };
    } else {
      const date = document.getElementById('cf-date').value;
      if (!isValidDateStr(date)) { alert('올바른 날짜를 입력해주세요.'); return; }
      if (isFutureDate(date) && !confirm('미래 날짜입니다. 이대로 저장할까요?')) return;
      entry = { ...entry, date,
        title: document.getElementById('cf-title').value.trim(),
        wods: getWods(),
        diary: document.getElementById('cf-diary').value.trim() };
    }
    let logs = getLogs();
    const isEdit = !!editingId;
    logs = isEdit ? logs.map(l => l.id === editingId ? entry : l) : [entry, ...logs];
    snapshotBeforeWrite('sportslogs');
    if (!safeSetItem('sportslogs', JSON.stringify(logs))) return;
    closeModal();
    renderCalendar();
    renderLogs();
    updateBackupReminder();
    showToast(isEdit ? '기록을 수정했어요' : '기록을 저장했어요');
  }

  function deleteLog(id) {
    if (!confirm('이 기록을 삭제할까요?')) return;
    snapshotBeforeWrite('sportslogs');
    safeSetItem('sportslogs', JSON.stringify(getLogs().filter(l => l.id !== id)));
    renderCalendar();
    renderLogs();
    showToast('기록을 삭제했어요', {
      action: { label: '되돌리기', onClick: () => {
        if (restoreFromSnapshot('sportslogs')) showToast('되돌렸어요');
      }}
    });
  }

  function formatDate(str) {
    const [y, m, d] = str.split('-');
    return `${y}년 ${m}월 ${d}일`;
  }

  // ══════════════════════════════
  //  목록 렌더링
  // ══════════════════════════════
  function renderLogs() {
    let logs = getLogs();
    const titleEl = document.getElementById('log-title');

    const activeDate = selectedDate || todayStr;
    logs = logs.filter(l => l.date === activeDate);
    titleEl.textContent = `${formatDate(activeDate)} 기록`;

    const list = document.getElementById('log-list');
    if (logs.length === 0) {
      list.innerHTML = '<div class="empty">이 날은 기록이 없어요.<br>오른쪽 위 <strong>+ 기록 추가</strong> 버튼을 눌러보세요.</div>';
      return;
    }

    list.innerHTML = logs.map(log => {
      if (log.type === 'running') {
        const stats = [];
        if (log.distance) stats.push(`거리 <span>${escapeHtml(log.distance)}km</span>`);
        if (log.time) stats.push(`시간 <span>${escapeHtml(log.time)}분</span>`);
        if (log.place) stats.push(`장소 <span>${escapeHtml(log.place)}</span>`);
        return `
          <div class="log-item" onclick="openEditModal(${log.id})">
            <button class="delete-btn" onclick="event.stopPropagation(); deleteLog(${log.id})" aria-label="기록 삭제">✕</button>
            <div class="log-item-header">
              <span class="badge running">러닝</span>
              <span class="log-date">${formatDate(log.date)}</span>
            </div>
            ${stats.length ? `<div class="log-stats">${stats.map(s=>`<div class="stat">${s}</div>`).join('')}</div>` : ''}
            ${log.diary ? `<div class="log-diary">${escapeHtml(log.diary).replace(/\n/g,'<br>')}</div>` : ''}
          </div>`;
      } else {
        const rawWods = log.wods || (log.wod ? [log.wod] : []);
        const wods = rawWods.map(w => typeof w === 'string' ? { content: w, record: '', weights: [] } : w);
        const wodsHtml = wods.map((w, i) => {
          const explicitWeights = (w.weights || []).filter(wt => wt.movement || wt.weight);
          const parsedWeights = explicitWeights.length === 0 ? parseWeightsFromText(w.content) : [];
          const explicitChips = explicitWeights.map(wt =>
            `<div class="log-weight-chip">${escapeHtml(wt.movement || '?')} <strong>${wt.weight != null ? escapeHtml(fmtWeight(wt.weight, wt.unit || 'kg')) : '-'}</strong></div>`
          ).join('');
          const parsedChips = parsedWeights.map(wt =>
            `<div class="log-weight-chip parsed">${escapeHtml(wt.movement)} <strong>${escapeHtml(fmtWeight(wt.weight, wt.unit))}</strong></div>`
          ).join('');
          const allChips = explicitChips + parsedChips;
          return `
            <div class="log-wod-block">
              <div class="log-wod-label">WOD ${wods.length > 1 ? i + 1 : ''}</div>
              <div class="log-wod-content">${escapeHtml(w.content).replace(/\n/g,'<br>')}</div>
              ${w.record ? `<div style="font-size:12px;color:#888;margin-top:6px;">기록 <span style="font-weight:700;color:#222;">${escapeHtml(w.record)}</span></div>` : ''}
              ${allChips ? `<div class="log-weights">${allChips}</div>` : ''}
            </div>`;
        }).join('');
        return `
          <div class="log-item crossfit" onclick="openEditModal(${log.id})">
            <button class="delete-btn" onclick="event.stopPropagation(); deleteLog(${log.id})" aria-label="기록 삭제">✕</button>
            <div class="log-item-header">
              <span class="badge crossfit">크로스핏</span>
              <span class="log-date">${formatDate(log.date)}</span>
            </div>
            ${log.title ? `<div style="font-size:16px;font-weight:700;margin-bottom:10px;">${escapeHtml(log.title)}</div>` : ''}
            ${wodsHtml}
            ${log.diary ? `<div class="log-diary">${escapeHtml(log.diary).replace(/\n/g,'<br>')}</div>` : ''}
          </div>`;
      }
    }).join('');
  }

  // ══════════════════════════════
  //  방법 2: 텍스트 자동 파싱
  // ══════════════════════════════
  function parseWeightsFromText(text) {
    if (!text) return [];
    const results = [];
    const seen = new Set(); // normalized key
    const patterns = [
      { regex: /([가-힣a-zA-Z][가-힣a-zA-Z\s&\-]*?)\s+(\d+(?:\.\d+)?)\s*kg\b/gi, unit: 'kg' },
      { regex: /([가-힣a-zA-Z][가-힣a-zA-Z\s&\-]*?)\s+(\d+(?:\.\d+)?)\s*lbs?\b/gi, unit: 'lbs' },
    ];
    for (const { regex, unit } of patterns) {
      let match;
      while ((match = regex.exec(text)) !== null) {
        const movement = match[1].trim().replace(/\s+/g, ' ');
        const weight = parseFloat(match[2]);
        const key = normalizeMovement(movement);
        if (movement && !isNaN(weight) && /[a-zA-Z가-힣]/.test(movement) && !seen.has(key)) {
          seen.add(key);
          results.push({ movement, weight, unit, parsed: true });
        }
      }
    }
    return results;
  }

  // ══════════════════════════════
  //  무게 추이 (방법 1 + 2 통합)
  // ══════════════════════════════
  function getAllMovements(includeParsed) {
    const logs = getLogs().filter(l => l.type === 'crossfit');
    // normalized key → 처음 등장한 표기 (display name)
    const movMap = new Map();
    logs.forEach(log => {
      (log.wods || []).forEach(wod => {
        const explicit = (wod.weights || []).filter(w => w.movement && w.movement.trim());
        explicit.forEach(w => {
          const key = normalizeMovement(w.movement);
          if (!movMap.has(key)) movMap.set(key, w.movement.trim());
        });
        if (includeParsed && explicit.length === 0) {
          parseWeightsFromText(wod.content).forEach(w => {
            const key = normalizeMovement(w.movement);
            if (!movMap.has(key)) movMap.set(key, w.movement.trim());
          });
        }
      });
    });
    return [...movMap.values()].sort((a, b) => a.localeCompare(b, 'ko'));
  }

  function getMovementData(movement, includeParsed) {
    const targetKey = normalizeMovement(movement);
    const logs = getLogs()
      .filter(l => l.type === 'crossfit')
      .sort((a, b) => a.date.localeCompare(b.date));
    const data = [];
    logs.forEach(log => {
      (log.wods || []).forEach(wod => {
        const explicit = (wod.weights || []).filter(w =>
          normalizeMovement(w.movement) === targetKey && w.weight != null
        );
        if (explicit.length > 0) {
          explicit.forEach(w => {
            const kg = Math.round(toKg(parseFloat(w.weight), w.unit || 'kg') * 10) / 10;
            data.push({ date: log.date, weight: kg, origWeight: w.weight, origUnit: w.unit || 'kg', parsed: false });
          });
        } else if (includeParsed) {
          parseWeightsFromText(wod.content)
            .filter(w => normalizeMovement(w.movement) === targetKey)
            .forEach(w => {
              const kg = Math.round(toKg(w.weight, w.unit) * 10) / 10;
              data.push({ date: log.date, weight: kg, origWeight: w.weight, origUnit: w.unit, parsed: true });
            });
        }
      });
    });
    return data;
  }

  function openTrendModal() {
    const includeParsed = true;
    const movements = getAllMovements(includeParsed);
    const content = document.getElementById('trend-content');
    if (movements.length === 0) {
      content.innerHTML = '<div class="no-data-msg">WOD에 무게를 기록하거나<br>텍스트에 "동작명 43kg" 형식으로 쓰면<br>여기서 추이를 확인할 수 있어요</div>';
      document.getElementById('trend-modal-bg').classList.add('open');
      return;
    }
    const options = movements.map(m => `<option value="${escapeAttr(m)}">${escapeHtml(m)}</option>`).join('');
    content.innerHTML = `
      <select class="movement-selector" id="movement-select" onchange="updateChart()">
        ${options}
      </select>
      <label class="parse-toggle">
        <input type="checkbox" id="parse-toggle" checked onchange="updateChart()">
        텍스트 자동 감지 포함 <span style="color:#bbb;font-size:12px;">(점선 = 자동감지)</span>
      </label>
      <div class="chart-wrap" id="chart-area"></div>
      <div id="trend-stats"></div>
    `;
    updateChart();
    document.getElementById('trend-modal-bg').classList.add('open');
  }

  function updateChart() {
    const sel = document.getElementById('movement-select');
    const toggle = document.getElementById('parse-toggle');
    if (!sel) return;
    const includeParsed = toggle ? toggle.checked : true;
    // 종목 목록 갱신 (토글 상태 반영)
    const movements = getAllMovements(includeParsed);
    const current = sel.value;
    sel.innerHTML = movements.map(m => `<option value="${escapeAttr(m)}" ${m === current ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('');
    const movement = sel.value;
    if (!movement) return;
    const data = getMovementData(movement, includeParsed);
    document.getElementById('chart-area').innerHTML = renderSvgChart(data);
    document.getElementById('trend-stats').innerHTML = renderTrendSummary(data);
  }

  function closeTrendModal() { document.getElementById('trend-modal-bg').classList.remove('open'); }
  function closeTrendModalBg(e) { if (e.target === document.getElementById('trend-modal-bg')) closeTrendModal(); }

  function renderSvgChart(data) {
    if (data.length === 0) return '<div style="text-align:center;color:#bbb;font-size:14px;padding:40px 0;">아직 기록이 없어요</div>';

    const W = 480, H = 180;
    const padL = 46, padR = 16, padT = 20, padB = 36;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    const weights = data.map(d => d.weight);
    const minW = Math.min(...weights);
    const maxW = Math.max(...weights);
    const range = maxW - minW || 1;
    const yMin = Math.max(0, minW - range * 0.2);
    const yMax = maxW + range * 0.2;
    const yRange = yMax - yMin;

    const xOf = (i) => padL + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW);
    const yOf = (w) => padT + chartH - ((w - yMin) / yRange) * chartH;

    let gridLines = '';
    for (let i = 0; i <= 4; i++) {
      const w = yMin + (yRange / 4) * i;
      const yp = yOf(w);
      gridLines += `<line x1="${padL}" y1="${yp}" x2="${W - padR}" y2="${yp}" stroke="#ececec" stroke-width="1"/>`;
      gridLines += `<text x="${padL - 6}" y="${yp + 4}" text-anchor="end" font-size="11" fill="#bbb">${Math.round(w)}</text>`;
    }

    let xLabels = '';
    const step = Math.max(1, Math.ceil(data.length / 6));
    data.forEach((d, i) => {
      if (i % step === 0 || i === data.length - 1) {
        xLabels += `<text x="${xOf(i)}" y="${H - 4}" text-anchor="middle" font-size="11" fill="#bbb">${d.date.slice(5)}</text>`;
      }
    });

    const areaPath = `M ${xOf(0)},${yOf(data[0].weight)} ` +
      data.slice(1).map((d, i) => `L ${xOf(i+1)},${yOf(d.weight)}`).join(' ') +
      ` L ${xOf(data.length-1)},${padT + chartH} L ${xOf(0)},${padT + chartH} Z`;

    const linePoints = data.map((d, i) => `${xOf(i)},${yOf(d.weight)}`).join(' ');

    const maxVal = Math.max(...weights);
    const minVal = Math.min(...weights);
    const circles = data.map((d, i) => {
      const isMax = d.weight === maxVal;
      const isMin = d.weight === minVal && minVal !== maxVal;
      const isLast = i === data.length - 1;
      const r = (isLast || isMax || isMin) ? 5 : 3.5;
      const fill = d.parsed ? '#fff' : (isLast ? '#d0604a' : '#fff');
      const strokeDash = d.parsed ? '3,2' : 'none';
      let label = '';
      if (isMax) {
        label = d.origUnit === 'lbs'
          ? `<text x="${xOf(i)}" y="${yOf(d.weight) - 20}" text-anchor="middle" font-size="11" fill="#d0604a" font-weight="600">${d.origWeight}lbs</text><text x="${xOf(i)}" y="${yOf(d.weight) - 8}" text-anchor="middle" font-size="10" fill="#bbb">(${d.weight}kg)</text>`
          : `<text x="${xOf(i)}" y="${yOf(d.weight) - 9}" text-anchor="middle" font-size="11" fill="#d0604a" font-weight="600">${d.weight}kg</text>`;
      } else if (isMin) {
        label = d.origUnit === 'lbs'
          ? `<text x="${xOf(i)}" y="${yOf(d.weight) + 17}" text-anchor="middle" font-size="11" fill="#aaa">${d.origWeight}lbs</text><text x="${xOf(i)}" y="${yOf(d.weight) + 29}" text-anchor="middle" font-size="10" fill="#bbb">(${d.weight}kg)</text>`
          : `<text x="${xOf(i)}" y="${yOf(d.weight) + 17}" text-anchor="middle" font-size="11" fill="#aaa">${d.weight}kg</text>`;
      } else if (isLast && !isMax) {
        label = d.origUnit === 'lbs'
          ? `<text x="${xOf(i)}" y="${yOf(d.weight) - 20}" text-anchor="middle" font-size="11" fill="#d0604a" font-weight="600">${d.origWeight}lbs</text><text x="${xOf(i)}" y="${yOf(d.weight) - 8}" text-anchor="middle" font-size="10" fill="#bbb">(${d.weight}kg)</text>`
          : `<text x="${xOf(i)}" y="${yOf(d.weight) - 9}" text-anchor="middle" font-size="11" fill="#d0604a" font-weight="600">${d.weight}kg</text>`;
      }
      return `${label}<circle cx="${xOf(i)}" cy="${yOf(d.weight)}" r="${r}" fill="${fill}" stroke="#d0604a" stroke-width="2" stroke-dasharray="${strokeDash}"/>`;
    }).join('');

    return `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d0604a" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#d0604a" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#areaGrad)"/>
        <polyline points="${linePoints}" fill="none" stroke="#d0604a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${circles}
        ${xLabels}
      </svg>`;
  }

  function renderTrendSummary(data) {
    if (data.length === 0) return '';
    const weights = data.map(d => d.weight);
    const maxW = Math.max(...weights);
    const latest = data[data.length - 1];
    const first = data[0];
    const diff = latest.weight - first.weight;
    const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(1) + 'kg';
    const diffClass = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
    const hasLbs = data.some(d => d.origUnit === 'lbs');
    const lbsNote = hasLbs
      ? `<div style="font-size:11px;color:#bbb;text-align:center;margin-top:8px;">※ lbs 기록은 kg으로 환산됨 (1lbs = 0.4536kg)</div>`
      : '';
    const fmtChipWeight = (weightKg, origWeight, origUnit) => origUnit === 'lbs'
      ? `${origWeight}lbs<br><span style="font-size:12px;color:#aaa;font-weight:400;">(${weightKg}kg)</span>`
      : `${weightKg}kg`;
    const latestDisplay = fmtChipWeight(latest.weight, latest.origWeight, latest.origUnit);
    const maxDataPoint = data.find(d => d.weight === maxW);
    const maxDisplay = maxDataPoint ? fmtChipWeight(maxDataPoint.weight, maxDataPoint.origWeight, maxDataPoint.origUnit) : `${maxW}kg`;
    return `
      <div class="trend-summary">
        <div class="trend-chip"><div class="chip-label">최근 기록</div><div class="chip-value">${latestDisplay}</div></div>
        <div class="trend-chip"><div class="chip-label">최고 기록</div><div class="chip-value">${maxDisplay}</div></div>
        <div class="trend-chip"><div class="chip-label">처음 대비</div><div class="chip-value ${diffClass}">${diffStr}</div></div>
        <div class="trend-chip"><div class="chip-label">총 기록 수</div><div class="chip-value">${data.length}회</div></div>
      </div>
      ${lbsNote}`;
  }

  // ══════════════════════════════
  //  PR / 1RM 데이터
  // ══════════════════════════════
  function getPRData() { return JSON.parse(localStorage.getItem('prdata') || '{"movements":[]}'); }
  // savePRDataStore는 아래에 redefine

  let editingMovementId = null;
  let currentPRMovementId = null;
  let editingRecordId = null;

  function openAddMovementModal() {
    editingMovementId = null;
    document.getElementById('pr-movement-modal-title').textContent = '종목 추가';
    document.getElementById('pr-movement-name').value = '';
    document.getElementById('pr-movement-modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('pr-movement-name').focus(), 100);
  }

  function closePRMovementModal() { document.getElementById('pr-movement-modal-bg').classList.remove('open'); }
  function closePRMovementModalBg(e) { if (e.target === document.getElementById('pr-movement-modal-bg')) closePRMovementModal(); }

  function savePRMovement() {
    const name = document.getElementById('pr-movement-name').value.trim();
    if (!name) { alert('종목명을 입력해주세요.'); return; }
    if (name.length > 80) { alert('종목명은 80자 이내로 입력해주세요.'); return; }
    const data = getPRData();
    const isEdit = !!editingMovementId;
    if (isEdit) {
      const m = data.movements.find(m => m.id === editingMovementId);
      if (m) m.name = name;
    } else {
      data.movements.push({ id: Date.now(), name, records: [] });
    }
    savePRDataStore(data);
    closePRMovementModal();
    renderPRView();
    showToast(isEdit ? '종목을 수정했어요' : '종목을 추가했어요');
  }

  function deleteMovement(id) {
    if (!confirm('종목을 삭제할까요? 기록도 모두 삭제됩니다.')) return;
    const data = getPRData();
    data.movements = data.movements.filter(m => m.id !== id);
    savePRDataStore(data);
    renderPRView();
    showToast('종목을 삭제했어요', {
      action: { label: '되돌리기', onClick: () => {
        if (restoreFromSnapshot('prdata')) showToast('되돌렸어요');
      }}
    });
  }

  function savePRDataStore(data) {
    snapshotBeforeWrite('prdata');
    safeSetItem('prdata', JSON.stringify(data));
  }

  function openAddRecordModal(movementId) {
    currentPRMovementId = movementId;
    editingRecordId = null;
    document.getElementById('pr-record-modal-title').textContent = '기록 추가';
    document.getElementById('pr-record-date').value = todayStr;
    document.getElementById('pr-record-weight').value = '';
    document.getElementById('pr-record-unit').value = 'kg';
    document.getElementById('pr-record-type').value = '1RM';
    document.getElementById('pr-record-note').value = '';
    document.getElementById('pr-record-modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('pr-record-weight').focus(), 100);
  }

  function closePRRecordModal() { document.getElementById('pr-record-modal-bg').classList.remove('open'); }
  function closePRRecordModalBg(e) { if (e.target === document.getElementById('pr-record-modal-bg')) closePRRecordModal(); }

  function savePRRecord() {
    const date = document.getElementById('pr-record-date').value;
    const weight = parseFloat(document.getElementById('pr-record-weight').value);
    const unit = document.getElementById('pr-record-unit').value;
    const type = document.getElementById('pr-record-type').value;
    const note = document.getElementById('pr-record-note').value.trim();
    if (!isValidDateStr(date)) { alert('올바른 날짜를 입력해주세요.'); return; }
    if (isFutureDate(date) && !confirm('미래 날짜입니다. 이대로 저장할까요?')) return;
    if (isNaN(weight) || weight <= 0) { alert('무게를 숫자로 입력해주세요.'); return; }
    if (weight > 1000) { alert('무게가 너무 큽니다. 단위를 확인해주세요.'); return; }
    const data = getPRData();
    const movement = data.movements.find(m => m.id === currentPRMovementId);
    if (!movement) return;
    const isEdit = !!editingRecordId;
    if (isEdit) {
      const rec = movement.records.find(r => r.id === editingRecordId);
      if (rec) { rec.date = date; rec.weight = weight; rec.unit = unit; rec.type = type; rec.note = note; }
    } else {
      movement.records.push({ id: Date.now(), date, weight, unit, type, note });
    }
    movement.records.sort((a, b) => a.date.localeCompare(b.date));
    savePRDataStore(data);
    closePRRecordModal();
    renderPRView();
    showToast(isEdit ? 'PR 기록을 수정했어요' : 'PR 기록을 저장했어요');
  }

  function deleteRecord(movementId, recordId) {
    if (!confirm('기록을 삭제할까요?')) return;
    const data = getPRData();
    const m = data.movements.find(m => m.id === movementId);
    if (m) m.records = m.records.filter(r => r.id !== recordId);
    savePRDataStore(data);
    renderPRView();
    showToast('PR 기록을 삭제했어요', {
      action: { label: '되돌리기', onClick: () => {
        if (restoreFromSnapshot('prdata')) showToast('되돌렸어요');
      }}
    });
  }

  // ══════════════════════════════
  //  PR 뷰 렌더링
  // ══════════════════════════════
  function renderPRView() {
    const data = getPRData();
    const list = document.getElementById('pr-list');
    if (data.movements.length === 0) {
      list.innerHTML = '<div class="empty">관리할 종목이 없어요.<br>위의 <strong>+ 종목 추가</strong> 버튼으로 시작하세요.</div>';
      return;
    }

    list.innerHTML = data.movements.map(mov => {
      const records = [...mov.records].sort((a, b) => b.date.localeCompare(a.date)); // 최신순
      const sorted = [...mov.records].sort((a, b) => a.date.localeCompare(b.date));
      // 비교는 항상 kg 환산값 기준
      const sortedKg = sorted.map(r => toKg(r.weight, r.unit || 'kg'));
      const bestKg = sortedKg.length ? Math.max(...sortedKg) : null;

      const recordsHtml = records.map((rec) => {
        const chronIdx = sorted.findIndex(r => r.id === rec.id);
        const recKg = toKg(rec.weight, rec.unit || 'kg');
        const prevKg = chronIdx > 0 ? toKg(sorted[chronIdx - 1].weight, sorted[chronIdx - 1].unit || 'kg') : null;
        const diff = prevKg !== null ? recKg - prevKg : null;
        const allBest = Math.abs(recKg - bestKg) < 0.01;

        let diffBadge = '';
        if (diff !== null && Math.abs(diff) >= 0.05) {
          const cls = diff > 0 ? 'up' : 'down';
          diffBadge = `<span class="pr-diff ${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}kg</span>`;
        }

        const weightDisplay = fmtWeight(rec.weight, rec.unit || 'kg');
        const kgHint = (rec.unit === 'lbs')
          ? `<span style="font-size:11px;color:#aaa;font-weight:400;">(${recKg.toFixed(1)}kg)</span>`
          : '';

        return `
          <div class="pr-record-row">
            <span class="pr-record-date">${escapeHtml(rec.date.slice(5).replace('-', '/'))}</span>
            <span class="pr-record-weight">${escapeHtml(weightDisplay)} ${kgHint}</span>
            <span style="font-size:12px;color:#aaa;background:#f5f5f0;padding:2px 8px;border-radius:12px;">${escapeHtml(rec.type)}</span>
            ${allBest ? '<span class="pr-badge">최고</span>' : ''}
            ${diffBadge}
            ${rec.note ? `<span class="pr-record-note">${escapeHtml(rec.note)}</span>` : ''}
            <button class="pr-record-delete" onclick="event.stopPropagation(); deleteRecord(${mov.id}, ${rec.id})" aria-label="PR 기록 삭제">✕</button>
          </div>`;
      }).join('');

      // 미니 차트는 kg 환산값으로
      const miniChart = sorted.length >= 2 ? renderMiniChart(sortedKg) : '';
      const bestDisplay = bestKg !== null ? `최고 ${bestKg.toFixed(1)}kg` : '';

      return `
        <div class="pr-card">
          <div class="pr-card-header" onclick="togglePRCard(${mov.id})">
            <div class="pr-card-title">
              <span class="pr-card-name">${escapeHtml(mov.name)}</span>
              ${bestDisplay ? `<span class="pr-best-badge">${escapeHtml(bestDisplay)}</span>` : ''}
            </div>
            <div class="pr-card-actions">
              <span class="pr-card-meta">${records.length}회</span>
              <button class="pr-icon-btn" onclick="event.stopPropagation(); deleteMovement(${mov.id})" title="종목 삭제" aria-label="종목 삭제">✕</button>
            </div>
          </div>
          <div class="pr-card-body" id="pr-body-${mov.id}">
            ${miniChart ? `<div class="pr-mini-chart">${miniChart}</div>` : ''}
            <div class="pr-record-list">${recordsHtml || '<div style="color:#bbb;font-size:13px;padding:8px 0;">기록이 없어요</div>'}</div>
            <button class="add-record-btn" onclick="openAddRecordModal(${mov.id})">+ 기록 추가</button>
          </div>
        </div>`;
    }).join('');
  }

  function togglePRCard(id) {
    const body = document.getElementById(`pr-body-${id}`);
    if (body) body.classList.toggle('hidden');
  }

  function renderMiniChart(weights) {
    if (weights.length < 2) return '';
    const W = 440, H = 60;
    const padL = 8, padR = 8, padT = 8, padB = 8;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const minW = Math.min(...weights);
    const maxW = Math.max(...weights);
    const range = maxW - minW || 1;
    const xOf = (i) => padL + (i / (weights.length - 1)) * chartW;
    const yOf = (w) => padT + chartH - ((w - minW) / range) * chartH;
    const points = weights.map((w, i) => `${xOf(i)},${yOf(w)}`).join(' ');
    const areaPath = `M ${xOf(0)},${yOf(weights[0])} ` +
      weights.slice(1).map((w, i) => `L ${xOf(i+1)},${yOf(w)}`).join(' ') +
      ` L ${xOf(weights.length-1)},${padT + chartH} L ${xOf(0)},${padT + chartH} Z`;
    const lastX = xOf(weights.length - 1);
    const lastY = yOf(weights[weights.length - 1]);
    return `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:60px;display:block">
        <defs>
          <linearGradient id="miniGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d0604a" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#d0604a" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#miniGrad)"/>
        <polyline points="${points}" fill="none" stroke="#d0604a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${lastX}" cy="${lastY}" r="3.5" fill="#d0604a" stroke="#fff" stroke-width="1.5"/>
      </svg>`;
  }

  // ══════════════════════════════
  //  전역 키보드 / 초기화
  // ══════════════════════════════
  function closeAllOpenModals() {
    ['modal-bg', 'trend-modal-bg', 'pr-movement-modal-bg', 'pr-record-modal-bg'].forEach(id => {
      const el = document.getElementById(id);
      if (el && el.classList.contains('open')) el.classList.remove('open');
    });
    const modal = document.querySelector('#modal-bg .modal');
    if (modal) modal.style.height = '';
    editingId = null;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAllOpenModals();
  });

  renderCalendar();
  renderLogs();
  updateBackupReminder();

  window.addEventListener('resize', renderCalendar);
</script>

</body>
