<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크로스핏 컬러 선택</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #ede8e3; padding: 28px 16px 80px; }
  h2 { text-align: center; font-size: 18px; font-weight: 800; color: #2c1f14; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 13px; color: #b08060; margin-bottom: 28px; }

  .cards { display: flex; flex-direction: column; gap: 14px; max-width: 500px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 2px 10px rgba(100,70,50,0.08);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(100,70,50,0.13); }
  .card.selected { border-color: var(--c); }

  .color-swatch {
    width: 52px; height: 52px;
    border-radius: 14px;
    flex-shrink: 0;
    background: var(--c);
  }

  .card-info { flex: 1; }
  .card-name { font-size: 15px; font-weight: 800; color: #2c1f14; margin-bottom: 4px; }
  .card-code { font-size: 12px; color: #b08060; font-family: monospace; margin-bottom: 10px; }

  /* 미니 카드 미리보기 */
  .mini-card {
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #ecddd3;
    border-left: 3px solid var(--c);
    background: #faf6f2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 5px; color: #fff;
    background: var(--c);
    white-space: nowrap;
  }
  .mini-text { font-size: 11px; color: #7a5c44; }

  /* 기존 러닝 카드 비교용 */
  .running-ref {
    max-width: 500px; margin: 0 auto 20px;
    background: #fff; border-radius: 16px; padding: 14px 18px;
    border: 1px solid #ecddd3; border-left: 3px solid #c8956c;
    display: flex; align-items: center; gap: 8px;
    opacity: 0.8;
  }
  .running-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 5px; background: #f5ede3; color: #7c5c3e;
  }
  .ref-label { font-size: 11px; color: #b08060; }

  #bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center; padding: 16px;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  #bar.visible { display: block; }
</style>
</head>
<body>

<h2>크로스핏 컬러 선택</h2>
<p class="sub">러닝 카드랑 비교하면서 골라봐</p>

<!-- 러닝 참고용 -->
<div class="running-ref">
  <div class="running-badge">🏃 러닝</div>
  <div class="ref-label">러닝 카드 (기준 컬러 #c8956c)</div>
</div>

<div class="cards">

  <div class="card" style="--c:#b5652a" data-choice="a" onclick="pick(this)">
    <div class="color-swatch"></div>
    <div class="card-info">
      <div class="card-name">딥 테라코타</div>
      <div class="card-code">#b5652a</div>
      <div class="mini-card">
        <div class="mini-badge">🏋️ 크로스핏</div>
        <div class="mini-text">Clean & Jerk 43kg × 30회</div>
      </div>
    </div>
  </div>

  <div class="card" style="--c:#9b6b3e" data-choice="b" onclick="pick(this)">
    <div class="color-swatch"></div>
    <div class="card-info">
      <div class="card-name">버번 브라운</div>
      <div class="card-code">#9b6b3e</div>
      <div class="mini-card">
        <div class="mini-badge">🏋️ 크로스핏</div>
        <div class="mini-text">Clean & Jerk 43kg × 30회</div>
      </div>
    </div>
  </div>

  <div class="card" style="--c:#a07840" data-choice="c" onclick="pick(this)">
    <div class="color-swatch"></div>
    <div class="card-info">
      <div class="card-name">머스타드 브라운</div>
      <div class="card-code">#a07840</div>
      <div class="mini-card">
        <div class="mini-badge">🏋️ 크로스핏</div>
        <div class="mini-text">Clean & Jerk 43kg × 30회</div>
      </div>
    </div>
  </div>

  <div class="card" style="--c:#9e5c4a" data-choice="d" onclick="pick(this)">
    <div class="color-swatch"></div>
    <div class="card-info">
      <div class="card-name">로즈우드</div>
      <div class="card-code">#9e5c4a</div>
      <div class="mini-card">
        <div class="mini-badge">🏋️ 크로스핏</div>
        <div class="mini-text">Clean & Jerk 43kg × 30회</div>
      </div>
    </div>
  </div>

  <div class="card" style="--c:#c4856a" data-choice="e" onclick="pick(this)">
    <div class="color-swatch"></div>
    <div class="card-info">
      <div class="card-name">샌달우드</div>
      <div class="card-code">#c4856a</div>
      <div class="mini-card">
        <div class="mini-badge">🏋️ 크로스핏</div>
        <div class="mini-text">Clean & Jerk 43kg × 30회</div>
      </div>
    </div>
  </div>

</div>

<div id="bar"></div>

<script>
  let sel = null;
  function pick(el) {
    if (sel) sel.classList.remove('selected');
    el.classList.add('selected');
    sel = el;
    const name = el.querySelector('.card-name').textContent;
    const code = el.querySelector('.card-code').textContent;
    const bar = document.getElementById('bar');
    bar.style.background = code;
    bar.textContent = name + ' ' + code + ' — 터미널에서 확인해줘!';
    bar.classList.add('visible');
    try {
      fetch('/__select', { method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({type:'click', choice: el.dataset.choice, text: name + ' ' + code}) });
    } catch(e) {}
  }
</script>
</body>
</html>
